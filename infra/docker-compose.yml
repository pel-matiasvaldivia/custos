services:
  api:
    image: ghcr.io/pel-matiasvaldivia/custos-api:latest
    # build:
    #   context: ..
    #   dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:postgres_password@postgres:5432/custos_db?schema=public"
      JWT_SECRET: "secretKey"
    depends_on:
      - postgres
      - redis
    ports:
      - "3888:3000"

  web:
    image: ghcr.io/pel-matiasvaldivia/custos-web:latest
    # build:
    #   context: ..
    #   dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "1888:80"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: custos_db
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7
    expose:
      - "6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - miniodata:/data
    ports:
      - "9800:9000"
      - "9801:9001"

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935" # RTMP
      - "8554:8554" # RTSP
      - "8888:8888" # HLS
      - "8889:8889" # WebRTC
      - "9997:9997" # API

volumes:
  pgdata:
  miniodata:
